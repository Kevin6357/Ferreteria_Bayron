<!DOCTYPE html>
<html lang="Es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferretería Bayron - Control de Stock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/stock.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="topbar">
        <div class="title-business">
            <span>FERRETERIA BAYRON</span>
        </div>
        <div class="btn-menu">
            <button class="hamburger" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <div class="overlay"></div>

    <aside class="sidebar">
        <div class="sidebar-logo">Dashboard</div>
        <ul>
            <li>
                <a href="index.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </a>
            </li>
            <li>
                <a href="#" class="activo">
                    <i class="fa-solid fa-boxes-stacked"></i>
                    <span>Stock</span>
                </a>
            </li>
            <li>
                <a href="defectuoso.html">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Producto Defectuoso</span>
                </a>
            </li>
        </ul>
    </aside>

    <main>
        <nav class="breadcrumb">
            <span>Inicio</span>
            <i class="fa-solid fa-chevron-right"></i>
            <span id="breadcrumb-page">Stock</span>
        </nav>

        <div class="main-content">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center flex-wrap">
                    <h4 class="mb-0 fw-bold">
                        <i class="fas fa-clipboard-list text-primary me-2"></i>
                        ESTADO DE INVENTARIO
                    </h4>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalProducto">
                        <i class="fas fa-plus me-1"></i> REGISTRAR
                    </button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Producto</th>
                                    <th>Stock</th>
                                    <th>Estado</th>
                                    <th class="text-center">Opciones</th>
                                </tr>
                            </thead>
                            <tbody id="table-cliente">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
